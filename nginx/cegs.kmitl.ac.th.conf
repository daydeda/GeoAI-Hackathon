# /etc/nginx/sites-available/cegs.kmitl.ac.th.conf

# Redirect HTTP → HTTPS (catch-all for unknown hosts)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://iono-gnss.kmitl.ac.th$request_uri;
}

# Redirect HTTP → HTTPS (cegs domain)
server {
    listen 80;
    listen [::]:80;
    server_name cegs.kmitl.ac.th;
    return 301 https://$host$request_uri;
}

# Redirect HTTPS catch-all (unknown hosts) → iono-gnss
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/cegs.kmitl.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cegs.kmitl.ac.th/privkey.pem;
    return 301 https://iono-gnss.kmitl.ac.th$request_uri;
}

# Main: cegs.kmitl.ac.th
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cegs.kmitl.ac.th;
    ssl_certificate /etc/letsencrypt/live/cegs.kmitl.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cegs.kmitl.ac.th/privkey.pem;

    # GeoAI app (proxy ก่อน เพราะ specific กว่า)
    location /geoai-2026/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Redirect ทุก path อื่นๆ → iono-gnss
    location / {
        return 301 https://iono-gnss.kmitl.ac.th$request_uri;
    }
}