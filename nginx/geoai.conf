server {
    listen 80;
    server_name cegs.kmitl.ac.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cegs.kmitl.ac.th;

    ssl_certificate /etc/letsencrypt/live/cegs.kmitl.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cegs.kmitl.ac.th/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Internal auth_request endpoint: allow only ADMIN/MODERATOR sessions.
    location = /_geoai_admin_tools_auth {
        internal;
        proxy_pass http://127.0.0.1:4000/api/v1/admin/tools-access;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Backend API
    location /geoai-2026/api {
        rewrite ^/geoai-2026/api/(.*) /api/$1 break;
        rewrite ^/geoai-2026/api/health$ /health break;
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend app
    location /geoai-2026 {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Prisma Studio (production database browser)
    location = /prisma-studio {
        return 301 /prisma-studio/;
    }

    location /prisma-studio/ {
        auth_request /_geoai_admin_tools_auth;
        error_page 401 =302 /geoai-2026/login;
        error_page 403 = /geoai-2026;
        proxy_pass http://127.0.0.1:5566/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MinIO Console (production object storage)
    location = /minio {
        return 301 /minio/;
    }

    location /minio/ {
        auth_request /_geoai_admin_tools_auth;
        error_page 401 =302 /geoai-2026/login;
        error_page 403 = /geoai-2026;
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect ทุก path อื่น → iono-gnss
    location / {
        return 301 https://iono-gnss.kmitl.ac.th$request_uri;
    }
}