server {
    listen 80;
    server_name cegs.kmitl.ac.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cegs.kmitl.ac.th;

    ssl_certificate /etc/letsencrypt/live/cegs.kmitl.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cegs.kmitl.ac.th/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Backend API
    location /geoai-2026/api {
        rewrite ^/geoai-2026/api/(.*) /api/$1 break;
        rewrite ^/geoai-2026/api/health$ /health break;
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend app
    location /geoai-2026 {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirect ทุก path อื่น → iono-gnss
    location / {
        return 301 https://iono-gnss.kmitl.ac.th$request_uri;
    }
}