services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: geoai_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: geoai
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exposed ports; internal network only

  # ── MinIO Object Storage ───────────────────────────────────
  storage:
    image: minio/minio:latest
    container_name: geoai_storage_prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data_prod:/data
    ports:
      - "9000:9000" # Expose for backend API calls
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: geoai_backend_prod
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/geoai
      MINIO_ENDPOINT: storage
      MINIO_PORT: "9000"
    command: ["sh", "-lc", "npm run db:push && node dist/server.js"]
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"(require('http').get('http://localhost:4000/health', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1)))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: geoai_frontend_prod
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000" # Mount directly or use Nginx/Traefik
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data_prod:
    driver: local
  minio_data_prod:
    driver: local
